<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexGen Studio | Pro Edition</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6665013032384689" crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #8b3dff; --bg: #f4f5f7; --border: #d2d2d2; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow-x: hidden; }

        .navbar { height: 70px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 3000; position: fixed; top: 0; width: 100%; }
        .nav-left { font-weight: 800; font-size: 18px; color: var(--primary); text-decoration: none; }
        .nav-center-tools { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; overflow-x: auto; padding: 5px; }
        .nav-center-tools::-webkit-scrollbar { display: none; }
        
        .btn-tool { background: white; border: 1px solid #ddd; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 6px; white-space: nowrap; color: #333; }
        .btn-tool:hover { border-color: var(--primary); color: var(--primary); background: #fcfaff; }
        .btn-purple { background: var(--primary); color: white; border: none; padding: 10px 18px; }

        .hero-text { text-align: center; padding: 95px 10px 0px; font-weight: 800; font-size: 26px; z-index: 100; transition: 0.3s; }
        .hero-text span { color: var(--primary); }
        
        .ad-container { width: 100%; max-width: 900px; margin: 10px auto; text-align: center; overflow: hidden; background: #fff; border-radius: 8px; }

        .workspace { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 10px 0 120px; gap: 15px; position: relative; }
        .canvas-card { position: relative; background: white; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 2px solid var(--primary); transform-origin: top center; transition: 0.2s; }
        .page-delete-btn { position: absolute; top: -15px; right: -15px; background: #ff4d4d; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 50; }

        #floating-toolbar { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); display: none; background: white; padding: 10px 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 2500; align-items: center; gap: 10px; border: 1px solid #eee; max-width: 95vw; overflow-x: auto; }
        #floating-toolbar.active { display: flex; }
        .v-sep { width: 1px; height: 25px; background: #eee; }

        .zoom-controls { position: fixed; bottom: 80px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .btn-zoom { width: 40px; height: 40px; border-radius: 50%; background: white; border: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .project-footer { height: 60px; background: white; border-top: 1px solid #d2d2d2; display: flex; justify-content: center; align-items: center; width: 100%; z-index: 2000; position: fixed; bottom: 0; }
        .footer-content { display: flex; align-items: center; gap: 15px; font-size: 13px; color: #333; overflow-x: auto; padding: 0 10px; }
        .footer-content a { text-decoration: none; color: #1e1e1e; font-weight: 600; display: flex; align-items: center; gap: 4px; }

        /* PREVIEW MODE STYLES */
        body.preview-active .navbar, body.preview-active .hero-text, body.preview-active #floating-toolbar, body.preview-active .zoom-controls, body.preview-active .page-delete-btn { display: none !important; }
        #exit-preview { position: fixed; top: 20px; right: 20px; z-index: 5000; display: none; }
        body.preview-active #exit-preview { display: block; }

        @media (max-width: 768px) {
            .nav-left { display: none; }
            .canvas-card { transform: scale(0.42) !important; margin-bottom: -600px; }
            #floating-toolbar { top: 125px; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="nav-left">NexGen Studio</a>
        <div class="nav-center-tools">
            <button class="btn-tool" onclick="addText('heading')"><i data-lucide="heading"></i> Heading</button>
            <button class="btn-tool" onclick="addText('body')"><i data-lucide="type"></i> Body</button>
            <button class="btn-tool" onclick="document.getElementById('img-upload').click()"><i data-lucide="image"></i> Upload</button>
            <input type="file" id="img-upload" hidden onchange="uploadImage(event)">
            <div class="v-sep"></div>
            <button class="btn-tool" onclick="toggleList('bullet')"><i data-lucide="list"></i> Bullet</button>
            <button class="btn-tool" onclick="toggleList('number')"><i data-lucide="list-ordered"></i> 123</button>
            <button class="btn-tool" onclick="addLine()"><i data-lucide="minus"></i> Line</button>
            <div class="v-sep"></div>
            <button class="btn-tool" onclick="addNewPage()"><i data-lucide="plus-square"></i> Page</button>
            <button class="btn-tool" onclick="toggleOrientation()"><i data-lucide="refresh-cw"></i> Rotate</button>
            <button class="btn-tool" onclick="document.getElementById('bg-input').click()"><i data-lucide="palette"></i> BG</button>
            <input type="color" id="bg-input" hidden onchange="changeBG(this.value)">
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-tool" onclick="togglePreview()"><i data-lucide="eye"></i></button>
            <button class="btn-tool btn-purple" onclick="downloadPDF()"><i data-lucide="download"></i> <span>PDF</span></button>
        </div>
    </header>

    <button id="exit-preview" class="btn-tool btn-purple" onclick="togglePreview()"><i data-lucide="eye-off"></i> Exit Preview</button>

    <main class="workspace" id="workspace">
        <div class="hero-text">Professional Design <span>Made Simple</span></div>

        <div class="ad-container">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6665013032384689" data-ad-slot="6771712502" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div class="zoom-controls">
            <button class="btn-zoom" onclick="changeZoom(0.1)"><i data-lucide="zoom-in"></i></button>
            <button class="btn-zoom" onclick="changeZoom(-0.1)"><i data-lucide="zoom-out"></i></button>
            <button class="btn-zoom" onclick="resetZoom()"><i data-lucide="maximize"></i></button>
        </div>

        <div id="floating-toolbar">
            <div id="text-edit-tools" style="display:none; align-items:center; gap:8px;">
                <select id="font-family" onchange="updateStyle('fontFamily', this.value)" style="width:100px">
                    <option value="Arial">Arial</option>
                    <option value="Inter" selected>Inter</option>
                    <option value="Poppins">Poppins</option>
                </select>
                <input type="number" id="f-size" style="width:50px" onchange="updateStyle('fontSize', this.value)">
                <input type="color" onchange="updateStyle('fill', this.value)">
                <div class="v-sep"></div>
                <button class="btn-tool" onclick="toggleFormat('bold')"><i data-lucide="bold" size="14"></i></button>
                <button class="btn-tool" onclick="toggleFormat('italic')"><i data-lucide="italic" size="14"></i></button>
                <button class="btn-tool" onclick="toggleFormat('underline')"><i data-lucide="underline" size="14"></i></button>
                <div class="v-sep"></div>
                <button class="btn-tool" onclick="updateStyle('textAlign', 'left')"><i data-lucide="align-left" size="14"></i></button>
                <button class="btn-tool" onclick="updateStyle('textAlign', 'center')"><i data-lucide="align-center" size="14"></i></button>
                <button class="btn-tool" onclick="updateStyle('textAlign', 'right')"><i data-lucide="align-right" size="14"></i></button>
                <button class="btn-tool" onclick="updateStyle('textAlign', 'justify')"><i data-lucide="align-justify" size="14"></i></button>
            </div>
            
            <button class="btn-tool" id="btn-start-crop" style="display:none;" onclick="startCropMode()"><i data-lucide="crop"></i> CROP</button>
            <button class="btn-tool" style="color:#ff4d4d;" onclick="deleteObject()"><i data-lucide="trash-2"></i></button>

            <div id="crop-actions" style="display:none; gap:10px;">
                <button class="btn-tool btn-purple" onclick="applyCrop()">Apply</button>
                <button class="btn-tool" style="background:#ff4d4d; color:white; border:none;" onclick="cancelCrop()">Cancel</button>
            </div>
        </div>

        <div class="canvas-card active-page" id="card-1">
            <button class="page-delete-btn" onclick="deletePage('card-1')"><i data-lucide="trash-2" size="14"></i></button>
            <canvas id="canva-1"></canvas>
        </div>

        <div class="ad-container">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6665013032384689" data-ad-slot="6771712502" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div class="ad-container" style="margin-bottom: 80px;">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6665013032384689" data-ad-slot="6771712502" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </main>

    <footer class="project-footer">
        <div class="footer-content">
            <span>© 2026 Syed Mohsin</span>
            <a href="index.html">Home</a>
            <a href="guide.html">Guide</a>
            <a href="about.html">About Us</a>
            <a href="privacy.html">Privacy</a>
            <a href="contact.html">Contact</a>
            <a href="https://github.com/SayyedMohsin" target="_blank"><i data-lucide="github" size="14"></i> GitHub</a>
            <a href="https://www.linkedin.com/in/sayyed-mohsin-ali-63b8032b2/" target="_blank"><i data-lucide="linkedin" size="14"></i> LinkedIn</a>
        </div>
    </footer>

<script>
    lucide.createIcons();
    let canvases = [], activeCanvas = null, cropRect = null, targetImg = null, isPreview = false, currentZoom = 1;

    function initCanvas(id) {
        const c = new fabric.Canvas(id, { width: 794, height: 1123, backgroundColor: '#fff', preserveObjectStacking: true });
        c.on('selection:created', (e) => syncToolbar(e.selected[0]));
        c.on('selection:updated', (e) => syncToolbar(e.selected[0]));
        c.on('selection:cleared', () => document.getElementById('floating-toolbar').classList.remove('active'));
        c.on('mouse:down', () => setActive(c));
        canvases.push(c); return c;
    }
    activeCanvas = initCanvas('canva-1');

    function setActive(c) { activeCanvas = c; document.querySelectorAll('.canvas-card').forEach(el => el.classList.remove('active-page')); c.lowerCanvasEl.closest('.canvas-card').classList.add('active-page'); }
    
    function syncToolbar(obj) {
        if(isPreview) return;
        document.getElementById('floating-toolbar').classList.add('active');
        document.getElementById('text-edit-tools').style.display = obj.type.includes('text') ? 'flex' : 'none';
        document.getElementById('btn-start-crop').style.display = obj.type === 'image' ? 'flex' : 'none';
        if(obj.type.includes('text')) { document.getElementById('f-size').value = obj.fontSize; }
    }

    // --- BULLET & NUMBER LOGIC ---
    function toggleList(type) {
        const obj = activeCanvas.getActiveObject();
        if (!obj || !obj.text) return;
        let lines = obj.text.split('\n');
        let newList = lines.map((line, i) => {
            let clean = line.replace(/^•\s|^\d+\.\s/, '');
            return type === 'bullet' ? `• ${clean}` : `${i + 1}. ${clean}`;
        }).join('\n');
        obj.set('text', newList);
        activeCanvas.renderAll();
    }

    // --- PREVIEW LOGIC ---
    function togglePreview() {
        isPreview = !isPreview;
        document.body.classList.toggle('preview-active', isPreview);
        canvases.forEach(c => {
            c.discardActiveObject();
            c.selection = !isPreview;
            c.forEachObject(o => o.selectable = !isPreview);
            c.renderAll();
        });
    }

    // --- CROP LOGIC ---
    function startCropMode() {
        targetImg = activeCanvas.getActiveObject();
        if(!targetImg || targetImg.type !== 'image') return;
        cropRect = new fabric.Rect({ left: targetImg.left, top: targetImg.top, width: 200, height: 200, fill: 'rgba(139,61,255,0.3)', stroke: '#8b3dff', strokeDashArray: [5,5], cornerColor: 'white', cornerSize: 8 });
        activeCanvas.add(cropRect).setActiveObject(cropRect).renderAll();
        document.getElementById('crop-actions').style.display='flex';
    }

    function applyCrop() {
        const sX = targetImg.scaleX, sY = targetImg.scaleY;
        const left = (cropRect.left - targetImg.left) / sX;
        const top = (cropRect.top - targetImg.top) / sY;
        const width = cropRect.getScaledWidth() / sX;
        const height = cropRect.getScaledHeight() / sY;
        targetImg.set({ cropX: left, cropY: top, width: width, height: height });
        cancelCrop();
    }

    function cancelCrop() { activeCanvas.remove(cropRect); cropRect = null; document.getElementById('crop-actions').style.display='none'; activeCanvas.renderAll(); }

    // --- OTHER TOOLS ---
    function addText(t) { const txt = new fabric.IText(t==='heading'?'Heading':'Body', { left: 100, top: 100, fontSize: t==='heading'?40:20, fontFamily:'Inter' }); activeCanvas.add(txt).setActiveObject(txt).renderAll(); }
    function uploadImage(e) { const reader = new FileReader(); reader.onload = (f) => { fabric.Image.fromURL(f.target.result, (img) => { img.scaleToWidth(400); activeCanvas.add(img).setActiveObject(img); }); }; reader.readAsDataURL(e.target.files[0]); e.target.value = ''; }
    function deleteObject() { activeCanvas.remove(activeCanvas.getActiveObject()); activeCanvas.discardActiveObject().renderAll(); }
    function updateStyle(p, v) { const o = activeCanvas.getActiveObject(); if(o) { o.set(p, (p==='fontSize')?parseInt(v):v); activeCanvas.renderAll(); } }
    function toggleFormat(f) { const o = activeCanvas.getActiveObject(); if(o) { if(f==='bold') o.set('fontWeight', o.fontWeight==='bold'?'normal':'bold'); if(f==='italic') o.set('fontStyle', o.fontStyle==='italic'?'normal':'italic'); if(f==='underline') o.set('underline', !o.underline); activeCanvas.renderAll(); } }
    function changeBG(val) { activeCanvas.setBackgroundColor(val, activeCanvas.renderAll.bind(activeCanvas)); }
    function changeZoom(val) { currentZoom = Math.min(Math.max(currentZoom + val, 0.4), 2); document.querySelectorAll('.canvas-card').forEach(card => card.style.transform = `scale(${currentZoom})`); }
    function resetZoom() { currentZoom = 1; document.querySelectorAll('.canvas-card').forEach(card => card.style.transform = `scale(1)`); }
    function downloadPDF() { const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4'); pdf.addImage(activeCanvas.toDataURL({format:'png', multiplier:2}), 'PNG', 0, 0, 210, 297); pdf.save('NexGen_Studio.pdf'); }
    function deletePage(id) { if(canvases.length > 1) { document.getElementById(id).remove(); canvases = canvases.filter(c => c.lowerCanvasEl.id !== id.replace('card','canva')); } }
    function addNewPage() { const id = `canva-${Date.now()}`; const cardId = `card-${Date.now()}`; const card = document.createElement('div'); card.className = 'canvas-card'; card.id = cardId; card.innerHTML = `<button class="page-delete-btn" onclick="deletePage('${cardId}')"><i data-lucide="trash-2" size="14"></i></button><canvas id="${id}"></canvas>`; document.getElementById('workspace').appendChild(card); setActive(initCanvas(id)); lucide.createIcons(); }
    function toggleOrientation() { const w = activeCanvas.width; activeCanvas.setDimensions({ width: activeCanvas.height, height: w }); activeCanvas.renderAll(); }
    function addLine() { const line = new fabric.Rect({ left: 100, top: 150, width: 400, height: 2, fill: '#333' }); activeCanvas.add(line).setActiveObject(line); }
</script>
</body>
</html>
